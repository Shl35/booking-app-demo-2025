name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Start PostgreSQL with Docker Compose
        run: |
          cd backend
          docker compose up -d

      - name: Generate Prisma client
        run: |
          cd backend
          npx prisma generate

      - name: Run backend migrations
        run: |
          cd backend
          npx prisma migrate dev --name init

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build
